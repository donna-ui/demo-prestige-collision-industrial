/* asymmetric spans */
.svc.s1 { grid-column: span 3; grid-row: span 2; }
.svc.s2 { grid-column: span 3; grid-row: span 1; }
.svc.s3 { grid-column: span 2; grid-row: span 1; }
.svc.s4 { grid-column: span 2; grid-row: span 1; }
.svc.s5 { grid-column: span 2; grid-row: span 2; }
.svc.s6 { grid-column: span 2; grid-row: span 1; }

.svc.s7 .svc__bg { background-image: url("https://images.unsplash.com/photo-1544829099-b9a0c07fad1a?w=900&q=75&auto=format&fit=crop"); }
.svc.s8 .svc__bg { background-image: url("https://images.unsplash.com/photo-1525609004556-c46c7d6cf023?w=1400&q=75&auto=format&fit=crop"); }

/* featured card gets orange corner bracket */
.svc.s1::before, .svc.s5::before {
  content: "";
  position: absolute;
  top: 18px; left: 18px;
  width: 40px; height: 40px;

.svc.s1::after, .svc.s5::after {

  position: absolute;

  color: rgba(237,234,229,.85);
  line-height: 1.5;
  max-width: 560px;
  border-left: 3px solid var(--orange);
  padding-left: 18px;
}
.wall__frame {
  background: var(--gray);
  padding: 24px;
  max-width: 1600px;
  margin: -60px auto 100px;
  position: relative;
  border: 2px solid var(--black);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.04), 0 40px 60px rgba(0,0,0,.5);
  z-index: 3;
}
.wall__frame::before, .wall__frame::after,
.wall__frame > .rivet-bl, .wall__frame > .rivet-br {
  content: "";
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #777 0%, #222 60%, #000 100%);
}
.wall__frame::before { top: 10px; left: 10px; }
.wall__frame::after { top: 10px; right: 10px; }
.wall__frame > .rivet-bl { bottom: 10px; left: 10px; }
.wall__frame > .rivet-br { bottom: 10px; right: 10px; }

.chip-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
}
.chip {
  aspect-ratio: 3/4;
  position: relative;
  overflow: hidden;
  text-decoration: none; color: inherit; display: block;
  transition: transform .25s var(--ease);
}
.chip__swatch { position: absolute; inset: 0; transition: transform .5s var(--ease); will-change: transform; }
.chip__swatch::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,.1) 0%, transparent 40%, rgba(0,0,0,.3) 100%); }
.chip__meta {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 16px 18px;
  font-family: var(--f-oswald); font-weight: 700;
  letter-spacing: .08em;
  font-size: 13px;
  text-transform: uppercase;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,.7));
  z-index: 2;
}
.chip__meta small {
  display: block;
  font-family: var(--f-mono);
  font-weight: 400;
  letter-spacing: 0;
  font-size: 11px;
  opacity: .75;
  margin-top: 4px;
  text-transform: none;
}
.chip__hex {
  position: absolute;
  top: 14px; right: 16px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: .05em;
  background: rgba(0,0,0,.55);
  padding: 3px 7px;
  color: var(--paper);
  z-index: 2;
  border: 1px solid rgba(255,255,255,.15);
}
.chip:hover .chip__swatch { transform: scale(1.06); }

.c1 .chip__swatch { background: linear-gradient(135deg, #FF6B00 0%, #C04A00 100%); }
.c2 .chip__swatch { background: linear-gradient(135deg, #1F2E4D 0%, #0A1630 100%); }
.c3 .chip__swatch { background: linear-gradient(135deg, #8B0000 0%, #5A0000 100%); }
.c4 .chip__swatch { background: linear-gradient(135deg, #EDEAE5 0%, #C8BDA5 100%); color: var(--black); }
.c4 .chip__meta { color: var(--black); background: linear-gradient(180deg, transparent, rgba(0,0,0,.15)); }
.c4 .chip__hex { background: rgba(255,255,255,.55); color: var(--black); border-color: rgba(0,0,0,.2); }
.c5 .chip__swatch { background: linear-gradient(135deg, #1C1C1C 0%, #000 100%); }
.c6 .chip__swatch { background: linear-gradient(135deg, #FFD100 0%, #BF9C00 100%); color: var(--black); }
.c6 .chip__meta { color: var(--black); }
.c6 .chip__hex { color: var(--black); background: rgba(255,255,255,.4); border-color: rgba(0,0,0,.2); }
.c7 .chip__swatch { background: linear-gradient(135deg, #2A4D3A 0%, #0E2419 100%); }
.c8 .chip__swatch { background: linear-gradient(135deg, #7A8A99 0%, #4A5866 100%); }
.c9 .chip__swatch { background: linear-gradient(135deg, #B0392A 0%, #7A1F15 100%); }
.c10 .chip__swatch { background: linear-gradient(135deg, #C8BDA5 0%, #9A8E72 100%); color: var(--black); }
.c10 .chip__meta { color: var(--black); background: linear-gradient(180deg, transparent, rgba(0,0,0,.15));}
.c10 .chip__hex { background: rgba(255,255,255,.5); color: var(--black); border-color: rgba(0,0,0,.2); }

@media (max-width: 900px) { .chip-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 560px) { .chip-grid { grid-template-columns: repeat(2, 1fr); } }

/* ===== INTERLUDE — ATMOSPHERIC FULL BLEED ===== */
.interlude {
  position: relative;
  height: 80vh;
  min-height: 500px;
  background: url("https://images.unsplash.com/photo-1493238792000-8113da705763?w=2400&q=80&auto=format&fit=crop") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  overflow: hidden;
}
.interlude::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at center, transparent 20%, rgba(10,10,10,.85) 90%),
    linear-gradient(180deg, var(--black) 0%, transparent 15%, transparent 85%, var(--black) 100%);
}
.interlude__text {
  position: relative;
  z-index: 2;
  font-family: var(--f-display);
  font-size: clamp(36px, 6vw, 92px);
  line-height: .95;
  color: var(--paper);
  text-transform: uppercase;
  letter-spacing: -.01em;
  max-width: 20ch;
  text-shadow: 0 6px 30px rgba(0,0,0,.9);
}
.interlude__text em { font-style: normal; color: var(--orange); }
.interlude__attr {
  margin-top: 28px;
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: .3em;
  color: var(--orange);
  text-transform: uppercase;
  position: relative;
  z-index: 2;
}
.interlude__corners::before, .interlude__corners::after,
.interlude__corners > .c-bl, .interlude__corners > .c-br {
  content: "";
  position: absolute;
  width: 50px; height: 50px;
  border-color: var(--orange);
  border-style: solid;
  z-index: 2;
}
.interlude__corners::before { top: 40px; left: 40px; border-width: 3px 0 0 3px; }
.interlude__corners::after { top: 40px; right: 40px; border-width: 3px 3px 0 0; }
.interlude__corners > .c-bl { bottom: 40px; left: 40px; border-width: 0 0 3px 3px; }
.interlude__corners > .c-br { bottom: 40px; right: 40px; border-width: 0 3px 3px 0; }

/* ===== CREW ===== */
.crew {
  padding: 140px 3vw 160px;
  background: var(--coal);
  position: relative;
  overflow: hidden;
}
.crew__bg {
  position: absolute; inset: 0;
  background: url("https://images.unsplash.com/photo-1486496572940-2bb2341fdbdf?w=2000&q=70&auto=format&fit=crop") center/cover no-repeat;
  filter: brightness(.22) saturate(.4) contrast(1.1);
  z-index: 0;
}
.crew__bg::after {
  content: "";
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, var(--black) 0%, transparent 25%, transparent 75%, var(--black) 100%);
}
.crew__inner {
  position: relative; z-index: 2;
  max-width: 1400px;
  margin: 0 auto;
}
.crew__head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  margin-bottom: 70px;
  align-items: end;
  border-bottom: 3px solid var(--orange);
  padding-bottom: 28px;
}
.crew__label { font-family: var(--f-mono); font-size: 12px; letter-spacing: .25em; color: var(--orange); margin-bottom: 14px; text-transform: uppercase; }
.crew__title {
  font-family: var(--f-display);
  font-size: clamp(44px, 7vw, 108px);
  line-height: .88;
  text-transform: uppercase;
  letter-spacing: -.02em;
}
.crew__title em { font-style: normal; color: var(--orange); }
.crew__body {
  font-family: var(--f-sans);
  font-size: 17px;
  color: rgba(237,234,229,.85);
  line-height: 1.6;
  max-width: 48ch;
}
.crew__grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.badge {
  background: rgba(42,45,50,.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 2px solid var(--black);
  padding: 24px 22px 22px;
  position: relative;
  box-shadow: 6px 6px 0 var(--black), inset 0 0 0 1px rgba(255,255,255,.04);
}
.badge::before {
  content: "";
  position: absolute;
  top: -14px; left: 50%; transform: translateX(-50%);
  width: 10px; height: 20px;
  background: var(--gray-2);
  border: 2px solid var(--black);
  border-radius: 0 0 10px 10px;
}
.badge__head {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: .25em;
  color: var(--orange);
  text-transform: uppercase;
  margin-bottom: 16px;
  border-bottom: 1px dashed var(--gray-2);
  padding-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
.badge__name {
  font-family: var(--f-display);
  font-size: clamp(20px, 2.2vw, 28px);
  color: var(--paper);
  line-height: 1;
  letter-spacing: -.01em;
  text-transform: uppercase;
}
.badge__role {
  font-family: var(--f-oswald);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: .15em;
  color: var(--orange);
  text-transform: uppercase;
  margin-top: 6px;
}
.badge__years {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .1em;
  color: var(--zinc);
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--gray-2);
}
.badge--owner { background: var(--orange); color: var(--black); }
.badge--owner .badge__head { color: var(--black); border-color: rgba(0,0,0,.3); }
.badge--owner .badge__name { color: var(--black); }
.badge--owner .badge__role { color: var(--black); }
.badge--owner .badge__years { color: rgba(0,0,0,.7); border-color: rgba(0,0,0,.3); }
@media (max-width: 900px) { .crew__grid { grid-template-columns: repeat(2, 1fr); } .crew__head { grid-template-columns: 1fr; } }
@media (max-width: 500px) { .crew__grid { grid-template-columns: 1fr; } }

/* ===== PROCESS ===== */
.process {
  padding: 140px 3vw 160px;
  background: var(--blueprint);
  position: relative;
  color: #B9D2EC;
  overflow: hidden;
}
.process::before {
  content: "";
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent 0 39px, rgba(61,122,184,.15) 39px 40px),
    repeating-linear-gradient(90deg, transparent 0 39px, rgba(61,122,184,.15) 39px 40px);
  pointer-events: none;
}
.process::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 30%, rgba(255,107,0,.08) 0%, transparent 60%);
  pointer-events: none;
}
.process__inner {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
  z-index: 1;
}
.process__head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-bottom: 2px solid rgba(61,122,184,.4);
  padding-bottom: 20px;
  margin-bottom: 60px;
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: .25em;
  color: rgba(185,210,236,.75);
  text-transform: uppercase;
  flex-wrap: wrap;
  gap: 20px;
}
.process__label { font-family: var(--f-mono); font-size: 12px; letter-spacing: .25em; color: var(--orange); margin-bottom: 14px; text-transform: uppercase; }
.process__title {
  font-family: var(--f-display);
  font-size: clamp(42px, 7vw, 108px);
  line-height: .88;
  color: var(--paper);
  text-transform: uppercase;
  margin-bottom: 60px;
  letter-spacing: -.02em;
}
.process__title em { font-style: normal; color: var(--orange); }
.process__spec { font-family: var(--f-display); color: var(--orange); font-size: clamp(18px, 2.2vw, 28px); letter-spacing: 0; }
.steps {
  list-style: none;
  counter-reset: step;
  display: grid;
  gap: 0;
}
.steps li {
  counter-increment: step;
  display: grid;
  grid-template-columns: 100px 1fr 180px;
  gap: 30px;
  align-items: center;
  padding: 38px 0;
  border-top: 1px dashed rgba(61,122,184,.35);
}
.steps li:last-child { border-bottom: 1px dashed rgba(61,122,184,.35); }
.steps li::before {
  content: counter(step, decimal-leading-zero);
  font-family: var(--f-display);
  font-size: clamp(50px, 7vw, 84px);
  color: var(--orange);
  line-height: 1;
  letter-spacing: -.03em;
}
.steps h4 {
  font-family: var(--f-display);
  font-size: clamp(22px, 2.6vw, 34px);
  color: var(--paper);
  line-height: 1;
  text-transform: uppercase;
  margin-bottom: 10px;
  letter-spacing: -.01em;
}
.steps p { font-family: var(--f-sans); font-size: 15px; color: rgba(185,210,236,.8); line-height: 1.55; max-width: 50ch; }
.steps .dur { font-family: var(--f-mono); font-size: 11px; letter-spacing: .2em; color: rgba(185,210,236,.55); text-align: right; text-transform: uppercase; }
.steps .dur strong { display: block; font-family: var(--f-display); color: var(--orange); font-size: clamp(20px, 2.2vw, 28px); letter-spacing: 0; margin-top: 6px; font-weight: 400; }
@media (max-width: 720px) {
  .steps li { grid-template-columns: 70px 1fr; gap: 16px; }
  .steps .dur { grid-column: 1 / -1; text-align: left; margin-left: 86px; }
}

/* ===== VOICES ===== */
.voices {
  padding: 140px 3vw 160px;
  background: var(--concrete);
  position: relative;
  overflow: hidden;
}
.voices::before {
  content: "";
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(45deg, transparent 0 40px, rgba(255,107,0,.025) 40px 42px);
  pointer-events: none;
}
.voices__head { position: relative; max-width: 1400px; margin: 0 auto 70px; border-bottom: 3px solid var(--orange); padding-bottom: 28px; }
.voices__label { font-family: var(--f-mono); font-size: 12px; letter-spacing: .25em; color: var(--orange); margin-bottom: 14px; text-transform: uppercase; }
.voices__title { font-family: var(--f-display); font-size: clamp(38px, 6vw, 80px); line-height: .9; text-transform: uppercase; color: var(--paper); letter-spacing: -.02em; }
.voices__grid { position: relative; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
.plate {
  position: relative;
  background: linear-gradient(145deg, #383C42 0%, #22252A 100%);
  padding: 44px 38px 36px;
  border: 2px solid var(--black);
  box-shadow: var(--shadow-plate);
  min-height: 320px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.plate::before, .plate::after,
.plate > .rivet-bl, .plate > .rivet-br {
  content: "";
  position: absolute;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #888 0%, #222 60%, #000 100%);
}
.plate::before { top: 12px; left: 12px; }
.plate::after { top: 12px; right: 12px; }
.plate > .rivet-bl { bottom: 12px; left: 12px; }
.plate > .rivet-br { bottom: 12px; right: 12px; }
.plate__stars { font-family: var(--f-sans); color: var(--orange); letter-spacing: .1em; font-size: 15px; margin-bottom: 14px; }
.plate__quote {
  font-family: var(--f-display);
  font-size: clamp(18px, 1.8vw, 24px);
  line-height: 1.25;
  color: var(--paper);
  letter-spacing: -.01em;
  text-transform: uppercase;
}
.plate__attr {
  margin-top: 24px; padding-top: 18px;
  border-top: 1px dashed var(--gray-2);
  display: flex; justify-content: space-between;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: .2em;
  color: var(--zinc);
  text-transform: uppercase;
}
.plate__attr strong { color: var(--orange); font-weight: 500; }
@media (max-width: 820px) { .voices__grid { grid-template-columns: 1fr; } }

/* ===== TICKER ===== */
.ticker {
  background: var(--yellow);
  color: var(--black);
  padding: 22px 0;
  overflow: hidden;
  border-top: 3px solid var(--black);
  border-bottom: 3px solid var(--black);
  position: relative;
}
.ticker__track {
  display: flex; gap: 50px;
  white-space: nowrap;
  animation: tick 40s linear infinite;
  font-family: var(--f-display);
  letter-spacing: .05em;
  font-size: clamp(18px, 2vw, 28px);
  text-transform: uppercase;
  will-change: transform;
}
.ticker__track a { color: var(--black); text-decoration: none; }
.ticker__track span.dot { color: var(--red); font-weight: 700; }
@keyframes tick { to { transform: translate3d(-50%, 0, 0); } }
@media (prefers-reduced-motion: reduce) { .ticker__track { animation: none; } }

/* ===== FOOTER ===== */
.footer {
  background: var(--black);
  padding: 140px 3vw 50px;
  position: relative;
  overflow: hidden;
}
.footer__brick {
  position: absolute; inset: 0;
  background:
    url("https://images.unsplash.com/photo-1525609004556-c46c7d6cf023?w=2000&q=70&auto=format&fit=crop") center/cover no-repeat;
  filter: brightness(.18) saturate(.4) contrast(1.1);
}
.footer__brick::after {
  content: "";
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, var(--black) 0%, transparent 30%, transparent 70%, var(--black) 100%);
}
.footer__inner {
  position: relative;
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 50px;
}
.sign {
  background: var(--gray);
  padding: 50px 44px;
  border: 3px solid var(--black);
  box-shadow: var(--shadow-plate);
  position: relative;
}
.sign::before, .sign::after, .sign > .rivet-bl, .sign > .rivet-br {
  content: "";
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #888 0%, #222 60%, #000 100%);
}
.sign::before { top: 14px; left: 14px; }
.sign::after { top: 14px; right: 14px; }
.sign > .rivet-bl { bottom: 14px; left: 14px; }
.sign > .rivet-br { bottom: 14px; right: 14px; }
.sign__brand {
  font-family: var(--f-display);
  font-size: clamp(34px, 4vw, 52px);
  color: var(--paper);
  line-height: 1;
  letter-spacing: -.02em;
  text-transform: uppercase;
}
.sign__brand span { color: var(--orange); }
.sign__sub {
  font-family: var(--f-oswald);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--orange);
  margin: 10px 0 32px;
  border-bottom: 2px solid var(--orange);
  padding-bottom: 14px;
  display: inline-block;
}
.sign__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 40px; }
.sign__grid h4 { font-family: var(--f-mono); font-size: 11px; letter-spacing: .2em; color: var(--zinc); text-transform: uppercase; margin-bottom: 8px; }
.sign__grid p, .sign__grid a { font-family: var(--f-sans); font-size: 15px; color: var(--paper); text-decoration: none; line-height: 1.5; }
.sign__grid a:hover { color: var(--orange); }
.sign__plate {
  margin-top: 32px;
  display: inline-block;
  background: var(--yellow);
  color: var(--black);
  font-family: var(--f-display);
  font-size: clamp(16px, 2vw, 22px);
  padding: 12px 20px;
  letter-spacing: .04em;
  border: 3px solid var(--black);
  text-transform: uppercase;
}
.spec-sheet {
  background: var(--blueprint);
  color: #B9D2EC;
  padding: 40px 36px;
  border: 3px solid var(--black);
  box-shadow: var(--shadow-plate);
  font-family: var(--f-mono);
  font-size: 13px;
  line-height: 1.7;
}
.spec-sheet h4 {
  font-family: var(--f-display);
  font-size: 18px;
  letter-spacing: -.01em;
  color: var(--orange);
  text-align: left;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 2px solid rgba(61,122,184,.4);
  text-transform: uppercase;
}
.spec-sheet .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed rgba(61,122,184,.25); }
.spec-sheet .row:last-child { border: 0; }
.spec-sheet .row strong { color: var(--paper); font-weight: 500; }
.spec-sheet .sig { margin-top: 20px; padding-top: 16px; border-top: 2px solid rgba(61,122,184,.4); text-align: center; font-family: var(--f-oswald); letter-spacing: .25em; font-size: 12px; text-transform: uppercase; color: var(--orange); }
.footer__legal { margin-top: 70px; text-align: center; font-family: var(--f-mono); letter-spacing: .2em; font-size: 10px; color: var(--zinc); text-transform: uppercase; position: relative; }
@media (max-width: 820px) { .footer__inner { grid-template-columns: 1fr; } .sign__grid { grid-template-columns: 1fr; } }

/* ===== STICKY MOBILE CTA ===== */
.sticky-cta {
  display: none;
  position: fixed; left: 0; right: 0; bottom: 0;
  z-index: 99;
  background: var(--orange);
  color: var(--black);
  text-align: center;
  padding: 16px;
  font-family: var(--f-display);
  letter-spacing: .05em;
  font-size: 14px;
  text-decoration: none;
  border-top: 3px solid var(--black);
  text-transform: uppercase;
}
@media (max-width: 820px) { .sticky-cta { display: block; } body { padding-bottom: 60px; } }

/* ===== 3D LAYER ===== */
.hero__title {
  text-shadow:
    1px 1px 0 #000,
    2px 2px 0 #000,
    3px 3px 0 #000,
